name: Scrape Positive News

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.https://cynutqsogvoelqqanxtq.supabase.co}}
          SUPABASE_KEY: ${{ secrets.sb_publishable_fvVUlrCIyV_XM_BML6v33A__TcEUqep }}
          TELEGRAM_TOKEN: ${{ secrets.8468442347:AAEq58e-gYGsOp5h2yV_7NUy-xPkVx6SGMM }}
          TELEGRAM_CHAT_ID: ${{ secrets.1494535103 }}
        run: python scraper.py
